<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Carpool — CarpoolSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500;600&family=Tiempos+Text:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Styrene A", ui-sans-serif, system-ui, sans-serif;
      background: #FAF9F5;
      color: #1A1714;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1A1714;
      color: #FAF9F5;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: #D4784A;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: "Tiempos Text", Georgia, serif;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #FAF9F5;
    }

    header .subtitle {
      font-size: 13px;
      color: #8C8680;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 14px;
      padding: 40px 44px;
      border: 1px solid #EAE8E3;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .card-heading {
      font-family: "Tiempos Text", Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      color: #1A1714;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: #8C8680;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #C0BAB4;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 20px 0 12px;
    }

    .form-field {
      margin-bottom: 14px;
    }

    .form-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8C8680;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .form-field input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #EAE8E3;
      border-radius: 7px;
      font-size: 15px;
      font-family: inherit;
      background: #FDFCFA;
      color: #1A1714;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-field input:focus {
      border-color: #D4784A;
    }

    .error-banner {
      background: #FDF0EC;
      border: 1px solid #E8B8A4;
      border-radius: 7px;
      padding: 10px 13px;
      font-size: 14px;
      color: #8B3A1E;
      margin-bottom: 18px;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #D4784A 0%, #C4633A 100%);
      color: #FAF9F5;
      border: none;
      padding: 13px 20px;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 10px;
    }

    .btn-submit:hover { opacity: 0.9; }

    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #8C8680;
    }

    .footer-link a {
      color: #D4784A;
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }

    .divider {
      height: 1px;
      background: #EAE8E3;
      margin: 20px 0;
    }

    @media (max-width: 480px) {
      header { padding: 20px 24px; }
      .card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">🚗</div>
  <div>
    <h1>CarpoolSync</h1>
    <div class="subtitle">Create your carpool group</div>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-heading">Start a new carpool</div>
    <div class="card-sub">Set up your group in under a minute</div>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/create-group">
      <div class="section-label">Your Group</div>
      <div class="form-field">
        <label>Group Name</label>
        <input type="text" name="group_name" value="{{ form.get('group_name', '') }}" placeholder="e.g. Teaneck Sunday Carpool" required autofocus>
      </div>

      <div class="divider"></div>
      <div class="section-label">Your Account</div>

      <div class="form-field">
        <label>Your Name</label>
        <input type="text" name="name" value="{{ form.get('name', '') }}" autocomplete="name" required>
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" name="email" value="{{ form.get('email', '') }}" autocomplete="email" required>
      </div>
      <div class="form-field">
        <label>Phone (optional)</label>
        <input type="tel" name="phone" value="{{ form.get('phone', '') }}" autocomplete="tel" placeholder="+1 201 555 0100">
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters">
      </div>

      <button type="submit" class="btn-submit">Create Carpool</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</main>

</body>
</html>
