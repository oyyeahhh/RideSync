<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Carpool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500;600&family=Tiempos+Text:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Styrene A", ui-sans-serif, system-ui, sans-serif;
      background: #FAF9F5;
      color: #1A1714;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: transparent;
      padding: 32px 48px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header img.site-logo {
      height: 300px;
      width: auto;
      display: block;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 14px;
      padding: 40px 44px;
      border: 1px solid #EAE8E3;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .card-heading {
      font-family: "Tiempos Text", Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      color: #1A1714;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: #8C8680;
      margin-bottom: 28px;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8C8680;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .form-field input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #EAE8E3;
      border-radius: 7px;
      font-size: 15px;
      font-family: inherit;
      background: #FDFCFA;
      color: #1A1714;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-field input:focus {
      border-color: #D4784A;
    }

    .error-banner {
      background: #FDF0EC;
      border: 1px solid #E8B8A4;
      border-radius: 7px;
      padding: 10px 13px;
      font-size: 14px;
      color: #8B3A1E;
      margin-bottom: 18px;
    }

    .btn-submit {
      width: 100%;
      background: #1A1714;
      color: #FAF9F5;
      border: none;
      padding: 12px 20px;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-submit:hover { background: #D4784A; }

    @media (max-width: 480px) {
      header { padding: 20px 24px; }
      .card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<header>
  <img src="/static/carpoolsynclogo.png" alt="CarpoolSync" class="site-logo">
</header>

<main>
  <div class="card">
    <div class="card-heading">Welcome back</div>
    <div class="card-sub">Sign in to your carpool account</div>

    {% if success %}
    <div style="background:#F0FAF3;border:1px solid #B7DFC4;border-radius:7px;padding:10px 13px;font-size:14px;color:#1A5C30;margin-bottom:18px;">{{ success }}</div>
    {% endif %}

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-field">
        <label>Email</label>
        <input type="email" name="email" value="{{ email or '' }}" autocomplete="email" required autofocus>
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#8C8680;margin:4px 0 14px;cursor:pointer;user-select:none;">
        <input type="checkbox" name="remember" style="width:16px;height:16px;cursor:pointer;accent-color:#D4784A;">
        Keep me signed in for 30 days
      </label>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <a href="/forgot-password" style="display:block;text-align:center;margin-top:16px;font-size:14px;color:#8C8680;text-decoration:none;">Forgot password?</a>

    <div style="border-top:1px solid #EAE8E3;margin-top:24px;padding-top:20px;text-align:center;">
      <div style="font-size:13px;color:#8C8680;margin-bottom:10px;">Starting a new carpool group?</div>
      <a href="/create-group" style="display:inline-block;padding:9px 20px;border:1px solid #EAE8E3;border-radius:7px;font-size:14px;font-weight:500;color:#1A1714;text-decoration:none;">Create a new group</a>
      <div style="font-size:12px;color:#B0ABA5;margin-top:10px;">Already invited? Use the link sent to your WhatsApp.</div>
    </div>
  </div>
</main>

</body>
</html>
