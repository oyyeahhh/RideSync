<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Carpool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500;600&family=Tiempos+Text:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Styrene A", ui-sans-serif, system-ui, sans-serif;
      background: #FAF9F5;
      color: #1A1714;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1A1714;
      color: #FAF9F5;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: #D4784A;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: "Tiempos Text", Georgia, serif;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #FAF9F5;
    }

    header .subtitle {
      font-size: 13px;
      color: #8C8680;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 14px;
      padding: 40px 44px;
      border: 1px solid #EAE8E3;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .card-heading {
      font-family: "Tiempos Text", Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      color: #1A1714;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: #8C8680;
      margin-bottom: 28px;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8C8680;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .form-field input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #EAE8E3;
      border-radius: 7px;
      font-size: 15px;
      font-family: inherit;
      background: #FDFCFA;
      color: #1A1714;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-field input:focus {
      border-color: #D4784A;
    }

    .error-banner {
      background: #FDF0EC;
      border: 1px solid #E8B8A4;
      border-radius: 7px;
      padding: 10px 13px;
      font-size: 14px;
      color: #8B3A1E;
      margin-bottom: 18px;
    }

    .btn-submit {
      width: 100%;
      background: #1A1714;
      color: #FAF9F5;
      border: none;
      padding: 12px 20px;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-submit:hover { background: #D4784A; }

    @media (max-width: 480px) {
      header { padding: 20px 24px; }
      .card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">🚗</div>
  <div>
    <h1>Carpool</h1>
    <div class="subtitle">Teaneck Carpool</div>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-heading">Welcome back</div>
    <div class="card-sub">Sign in to your carpool account</div>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-field">
        <label>Email</label>
        <input type="email" name="email" value="{{ email or '' }}" autocomplete="email" required autofocus>
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>
  </div>
</main>

</body>
</html>
