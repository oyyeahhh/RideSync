<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — CarpoolSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500;600&family=Tiempos+Text:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Styrene A", ui-sans-serif, system-ui, sans-serif;
      background: #FAF9F5;
      color: #1A1714;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: transparent;
      padding: 32px 48px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header img.site-logo {
      height: 100px;
      width: auto;
      display: block;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 14px;
      padding: 40px 44px;
      border: 1px solid #EAE8E3;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .card-heading {
      font-family: "Tiempos Text", Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      color: #1A1714;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: #8C8680;
      margin-bottom: 28px;
    }

    .form-field { margin-bottom: 16px; }

    .form-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8C8680;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .form-field input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #EAE8E3;
      border-radius: 7px;
      font-size: 15px;
      font-family: inherit;
      background: #FDFCFA;
      color: #1A1714;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-field input:focus { border-color: #D4784A; }

    .btn-submit {
      width: 100%;
      background: #1A1714;
      color: #FAF9F5;
      border: none;
      padding: 12px 20px;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-submit:hover { background: #D4784A; }

    .error-banner {
      background: #FDF0EC;
      border: 1px solid #E8B8A4;
      border-radius: 7px;
      padding: 10px 13px;
      font-size: 14px;
      color: #8B3A1E;
      margin-bottom: 18px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #8C8680;
      text-decoration: none;
    }

    .back-link:hover { color: #1A1714; }

    @media (max-width: 480px) {
      .card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<header>
  <img src="/static/carpoolsynclogo.png" alt="CarpoolSync" class="site-logo">
</header>

<main>
  <div class="card">
    <div class="card-heading">Set new password</div>
    <div class="card-sub">Choose a password at least 8 characters long.</div>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ action }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-field">
        <label>New Password</label>
        <input type="password" name="password" autocomplete="new-password" minlength="8" required autofocus>
      </div>
      <div class="form-field">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required>
      </div>
      <button type="submit" class="btn-submit">Update Password</button>
    </form>

    <a href="/login" class="back-link">← Back to sign in</a>
  </div>
</main>

</body>
</html>
